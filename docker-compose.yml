services:

  backend:
    build: ./backend
    container_name: backend-container

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
      - /app/node_modules

    restart: always



  frontend:
    build: ./frontend
    container_name: frontend-container

    ports:
      - "5173:5173"

    env_file:
      - ./frontend/.env

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    restart: always