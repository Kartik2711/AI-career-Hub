services:

  backend:
    build: ./backend
    container_name: backend-container

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    restart: always



  frontend:
    build: ./frontend
    container_name: frontend-container

    ports:
      - "80:80"

    depends_on:
      - backend

    restart: always