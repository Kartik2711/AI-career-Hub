version: 0.0
os: linux
files:
  - source: /
    destination: /home/ubuntu/app
    overwrite: true
permissions:
  - object: /home/ubuntu/app
    owner: ubuntu
    group: ubuntu
    mode: '755'
    except:
      - /home/ubuntu/app/scripts
    type:
      - directory
      - file
  - object: /home/ubuntu/app/scripts
    owner: ubuntu
    group: ubuntu
    pattern: "*.sh"
    mode: '755'
    type:
      - file
hooks:
  ApplicationStop:
    - location: scripts/stop_app.sh
      timeout: 30
      runas: ubuntu
  AfterInstall:
    - location: scripts/install_deps.sh
      timeout: 300
      runas: ubuntu
  ApplicationStart:
    - location: scripts/start_app.sh
      timeout: 60
      runas: ubuntu
